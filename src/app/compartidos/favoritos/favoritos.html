<div class="favoritos-container">
  <h2>Mis favoritos</h2>

  @if (favoritos.length === 0) {
    <div class="favoritos-empty"><h3 class="textoSinFavoritos">Aún no hay productos favoritos.</h3></div>
  }

  <div class="favoritos-grid">
    @for (f of favoritos; track f.producto.id + '-' + f.tipo) {
      <article class="favorito-card">
        <img src="{{f.producto.imagenUrl}}" alt="{{f.producto.nombre}}">
        <div class="favorito-card-body">
          <h3>{{ f.producto.nombre }} <span class="badge">{{ f.tipo }}</span></h3>
          <p class="descripcion">{{ f.producto.descripcion }}</p>
          <p class="precio">${{ f.producto.precio.toFixed(2) }}</p>
          <button type="button" class="btn-remove-fav" (click)="eliminarFavorito(f.producto.id, f.tipo)">Quitar</button>
          <button (click)="comprar(f.producto, f.tipo)" class="btn-add-cart">Comprar</button>
        </div>
      </article>
    }
  </div>
</div>
