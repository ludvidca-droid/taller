<div class="carrito-container">
  <h2>Tu Carrito de Compras</h2>
  @for (p of carrito; track p.id) {
    <div class="carrito-item">
      <img src="{{p.imagenUrl}}" alt="{{p.nombre}}">
      <div class="item-details">
        <h3>{{p.nombre}}</h3>
        <p>Precio: ${{p.precio.toFixed(2)}}</p>
        <div class="quantity-controls">
          <button class="btn-quantity" (click)="disminuirCantidad(p.id)">-</button>
          <span>{{p.cantidad ?? 1}}</span>
          <button class="btn-quantity" (click)="incrementarCantidad(p.id)">+</button>
        </div>
        <button (click)="eliminarDelCarrito(p.id)" class="btn-remove">Eliminar</button>
      </div>
    </div>
  }
  <div class="carrito-total">
    <h3>Total: ${{ total.toFixed(2) }}</h3>
    <button class="btn-checkout">Proceder al Pago</button>
  </div>
</div>
