<div class="ofertas-container">
  <h2>OFERTAS</h2>
  <div class="ofertas-grid">
    @for (oferta of ofertas; track oferta.id){
      @if (oferta.disponibilidad){
        <article class="oferta-card">
          <button
            type="button"
            class="star-btn"
            [class.active]="isFavorito(oferta)"
            (click)="toggleFavorito(oferta)"
            aria-label="Agregar a favoritos"
          >
            {{ isFavorito(oferta) ? '★' : '☆' }}
          </button>
          <div class="oferta-badge">{{ oferta.descuento }}% OFF</div>
          <img src="{{oferta.imagenUrl}}" alt="{{oferta.nombre}}" class="oferta-img">
          <div class="oferta-card-body">
            <h3>{{oferta.nombre}}</h3>
            <p class="descripcion">{{oferta.descripcion}}</p>
            <div class="precio-section">
              <p class="precio-original">${{oferta.precio.toFixed(2)}}</p>
            </div>
            <button type="button" class="btn-add-cart btn-comprar" (click)="agregarAlCarrito(oferta)">Comprar</button>
          </div>
        </article>
      }
    }
  </div>
</div>
